<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人收支管理系統 (資產加強版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .tab-active { background: #ffffff; color: #2563eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .loading-spinner { border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tag-badge { background: #eff6ff; color: #3b82f6; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; }
        
        /* Toast 提示樣式 */
        #toast {
            visibility: hidden;
            min-width: 200px;
            margin-left: -100px;
            background-color: #10b981;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 12px 24px;
            position: fixed;
            z-index: 100;
            left: 50%;
            top: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: visibility 0s, opacity 0.3s linear;
            opacity: 0;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Toast 提示框 -->
    <div id="toast">存取完成</div>

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40 px-4 py-3 flex justify-between items-center">
        <h1 class="text-lg font-bold text-gray-800 flex items-center gap-2">
            <span class="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="wallet" class="w-5 h-5"></i></span>
            智慧帳務管家
        </h1>
        <button onclick="toggleModal('settingsModal')" class="p-2 text-gray-400 hover:bg-gray-100 rounded-full transition">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-5">
        
        <!-- 總資產大卡片 -->
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 text-white rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase mb-1">預估總資產 (Net Worth)</p>
                <h2 id="totalAssetsDisp" class="text-4xl font-extrabold tracking-tighter mb-6">NT$ 0</h2>
                
                <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                    <div>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">存款總計</p>
                        <p id="accountTotalDisp" class="font-bold text-sm text-blue-400">NT$ 0</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">收支淨額</p>
                        <p id="transBalanceDisp" class="font-bold text-sm text-emerald-400">NT$ 0</p>
                    </div>
                </div>
            </div>
            <div class="absolute -right-12 -top-12 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>
        </div>

        <!-- 本月統計資訊訊息區塊 -->
        <div class="grid grid-cols-3 gap-3 bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
            <div class="text-center">
                <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">本月收入</p>
                <p id="mIncomeDisp" class="text-emerald-600 font-bold text-sm">+0</p>
            </div>
            <div class="text-center border-x border-gray-100 px-2">
                <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">本月支出</p>
                <p id="mExpenseDisp" class="text-rose-500 font-bold text-sm">-0</p>
            </div>
            <div class="text-center">
                <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">本月結餘</p>
                <p id="mBalanceDisp" class="text-gray-700 font-bold text-sm">0</p>
            </div>
        </div>

        <!-- 導覽切換 -->
        <div class="flex bg-gray-200/50 p-1.5 rounded-2xl">
            <button onclick="switchTab('record')" id="tab-record" class="flex-1 py-2.5 rounded-xl font-bold text-xs transition tab-active">記帳</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2.5 rounded-xl font-bold text-xs transition text-gray-500">明細</button>
            <button onclick="switchTab('accounts')" id="tab-accounts" class="flex-1 py-2.5 rounded-xl font-bold text-xs transition text-gray-500">資產</button>
            <button onclick="switchTab('ai')" id="tab-ai" class="flex-1 py-2.5 rounded-xl font-bold text-xs transition text-gray-500">AI</button>
        </div>

        <!-- 頁面：新增紀錄 -->
        <section id="page-record" class="space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 space-y-5">
                <div class="flex p-1 bg-gray-100 rounded-xl">
                    <button onclick="setType('支出')" id="btn-type-expense" class="flex-1 py-2 rounded-lg font-bold text-sm transition bg-rose-500 text-white shadow-md">支出</button>
                    <button onclick="setType('收入')" id="btn-type-income" class="flex-1 py-2 rounded-lg font-bold text-sm transition text-gray-500">收入</button>
                </div>
                <div class="space-y-4">
                    <div class="relative">
                        <span class="absolute left-0 bottom-3 text-gray-400 font-medium">NT$</span>
                        <input type="text" inputmode="decimal" id="inputAmount" placeholder="0" class="w-full pl-10 text-4xl font-bold border-b-2 border-gray-100 focus:border-blue-500 outline-none pb-2">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">主要分類</label>
                            <select id="inputCategory" class="w-full bg-gray-50 rounded-xl p-3 text-sm border-none ring-1 ring-gray-200"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">日期</label>
                            <input type="date" id="inputDate" class="w-full bg-gray-50 rounded-xl p-3 text-sm border-none ring-1 ring-gray-200">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">標籤 (空格分隔)</label>
                        <input type="text" id="inputTags" placeholder="#午餐 #外送" class="w-full bg-gray-50 rounded-xl p-3 text-sm border-none ring-1 ring-gray-200">
                    </div>
                    <input type="text" id="inputNote" placeholder="備註..." class="w-full bg-gray-50 rounded-xl p-3 text-sm border-none ring-1 ring-gray-200">
                </div>
                <button onclick="submitRecord()" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 flex justify-center items-center gap-2">儲存紀錄</button>
            </div>
        </section>

        <!-- 頁面：歷史明細 -->
        <section id="page-history" class="hidden space-y-3">
            <div id="historyList" class="space-y-3 text-center text-gray-400 py-10">讀取中...</div>
        </section>

        <!-- 頁面：資產帳戶 -->
        <section id="page-accounts" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i data-lucide="building-2" class="w-5 h-5 text-blue-600"></i> 帳戶存款管理
                </h3>
                <div id="accountsList" class="space-y-4"></div>
                <p class="text-[9px] text-gray-400 mt-6 text-center italic">* 此部分為銀行或郵局的固定存款，將與收支淨額加總。</p>
            </div>
        </section>

        <!-- 頁面：AI 分析 -->
        <section id="page-ai" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                <div id="aiResponse" class="text-sm text-gray-600 leading-relaxed min-h-[100px] bg-slate-50 p-4 rounded-xl border border-gray-100">AI 正在等待指令...</div>
                <button onclick="analyzeWithAI()" id="aiBtn" class="w-full mt-4 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg flex justify-center items-center gap-2">開始 AI 診斷</button>
            </div>
        </section>
    </div>

    <!-- 設定 Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-5 shadow-2xl">
            <h3 class="text-xl font-bold">系統設定</h3>
            <input type="password" id="gasUrlInput" placeholder="GAS API URL" class="w-full bg-gray-50 ring-1 ring-gray-200 rounded-xl p-3 text-sm outline-none">
            <input type="password" id="geminiKeyInput" placeholder="Gemini API Key (可選)" class="w-full bg-gray-50 ring-1 ring-gray-200 rounded-xl p-3 text-sm outline-none">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="saveSettings()" class="bg-blue-600 text-white font-bold py-3 rounded-xl">儲存</button>
                <button onclick="clearSettings()" class="bg-rose-50 text-rose-600 font-bold py-3 rounded-xl">重置</button>
            </div>
            <button onclick="toggleModal('settingsModal')" class="w-full text-gray-400 text-sm">關閉</button>
        </div>
    </div>

    <!-- 💡新增：自訂警告視窗 (Custom Alert) -->
    <div id="alertModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                <i data-lucide="info" class="w-5 h-5 text-blue-500"></i> 系統提示
            </h3>
            <p class="text-sm text-gray-600 whitespace-pre-wrap leading-relaxed" id="alertMessage"></p>
            <button onclick="document.getElementById('alertModal').classList.add('hidden')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">我知道了</button>
        </div>
    </div>

    <!-- 💡新增：自訂確認視窗 (Custom Confirm) -->
    <div id="confirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                <i data-lucide="alert-triangle" class="w-5 h-5 text-rose-500"></i> <span id="confirmTitle">確認操作</span>
            </h3>
            <p class="text-sm text-gray-600" id="confirmMessage">確定要執行此操作嗎？</p>
            <div class="flex gap-3 pt-2">
                <button id="confirmBtnYes" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl hover:bg-rose-600 transition">確定</button>
                <button onclick="closeConfirm()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition">取消</button>
            </div>
        </div>
    </div>

    <script>
        let currentType = '支出';
        let categories = { '收入': [], '支出': [] };
        let records = [];
        let accounts = [];
        let confirmActionCallback = null; // 紀錄確認後要執行的動作

        // 💡新增：控制自訂 Alert 的函數
        function customAlert(msg) {
            document.getElementById('alertMessage').textContent = msg;
            document.getElementById('alertModal').classList.remove('hidden');
        }

        // 💡新增：控制自訂 Confirm 的函數
        function showConfirm(title, message, callback) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.remove('hidden');
            confirmActionCallback = callback;
        }

        function closeConfirm() {
            document.getElementById('confirmModal').classList.add('hidden');
            confirmActionCallback = null;
        }

        document.getElementById('confirmBtnYes').addEventListener('click', () => {
            if(confirmActionCallback) confirmActionCallback();
            closeConfirm();
        });

        // 顯示提示訊息 (Toast)
        function showToast(message, bgColor = '#10b981') {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.style.backgroundColor = bgColor;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function toHalfWidth(str) {
            return String(str).replace(/[０-９]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) - 65248);
            }).replace(/[．。]/g, '.');
        }

        window.onload = () => {
            lucide.createIcons();
            document.getElementById('inputDate').valueAsDate = new Date();
            
            const amountInput = document.getElementById('inputAmount');
            amountInput.addEventListener('input', function(e) {
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = toHalfWidth(this.value);
                this.setSelectionRange(start, end);
            });

            loadSettings();
            fetchData();
        };

        function loadSettings() {
            const url = localStorage.getItem('gas_url');
            if (url) document.getElementById('gasUrlInput').value = url;
            const key = localStorage.getItem('gemini_api_key');
            if (key) document.getElementById('geminiKeyInput').value = key;
        }

        async function saveSettings() {
            localStorage.setItem('gas_url', document.getElementById('gasUrlInput').value.trim());
            localStorage.setItem('gemini_api_key', document.getElementById('geminiKeyInput').value.trim());
            toggleModal('settingsModal');
            showToast("設定已儲存");
            await fetchData();
        }

        function clearSettings() {
            // 💡更新為使用自訂確認視窗
            showConfirm('重置設定', '確定要清除所有連線設定並重新載入嗎？', () => {
                localStorage.clear(); 
                window.location.reload(); 
            });
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        function switchTab(tab) {
            ['record', 'history', 'accounts', 'ai'].forEach(t => {
                document.getElementById(`page-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "flex-1 py-2.5 rounded-xl font-bold text-xs transition text-gray-500";
            });
            document.getElementById(`page-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "flex-1 py-2.5 rounded-xl font-bold text-xs transition tab-active";
        }

        function setType(type) {
            currentType = type;
            const isExp = type === '支出';
            document.getElementById('btn-type-expense').className = isExp ? "flex-1 py-2 rounded-lg font-bold text-sm transition bg-rose-500 text-white shadow-md" : "flex-1 py-2 rounded-lg font-bold text-sm transition text-gray-500";
            document.getElementById('btn-type-income').className = !isExp ? "flex-1 py-2 rounded-lg font-bold text-sm transition bg-blue-600 text-white shadow-md" : "flex-1 py-2 rounded-lg font-bold text-sm transition text-gray-500";
            renderCategorySelect();
        }

        function renderCategorySelect() {
            const select = document.getElementById('inputCategory');
            select.innerHTML = '';
            (categories[currentType] || []).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.name; opt.textContent = c.name; select.appendChild(opt);
            });
        }

        async function fetchData() {
            const url = localStorage.getItem('gas_url');
            if (!url) return;
            try {
                const [sumRes, recRes, catRes, accRes] = await Promise.all([
                    fetch(`${url}?action=getSummary`),
                    fetch(`${url}?action=getRecords`),
                    fetch(`${url}?action=getCategories`),
                    fetch(`${url}?action=getAccounts`)
                ]);
                const summary = await sumRes.json();
                records = await recRes.json();
                categories = await catRes.json();
                accounts = await accRes.json();

                document.getElementById('totalAssetsDisp').textContent = `NT$ ${summary.totalAssets.toLocaleString()}`;
                document.getElementById('accountTotalDisp').textContent = `NT$ ${summary.accountTotal.toLocaleString()}`;
                document.getElementById('transBalanceDisp').textContent = `NT$ ${summary.transactionBalance.toLocaleString()}`;
                
                document.getElementById('mIncomeDisp').textContent = `+${summary.monthlyIncome.toLocaleString()}`;
                document.getElementById('mExpenseDisp').textContent = `-${summary.monthlyExpense.toLocaleString()}`;
                document.getElementById('mBalanceDisp').textContent = `${summary.monthlyBalance.toLocaleString()}`;
                
                renderCategorySelect();
                renderHistory();
                renderAccounts();
            } catch (err) { console.error(err); }
        }

        function renderAccounts() {
            const list = document.getElementById('accountsList');
            list.innerHTML = '';
            accounts.forEach(acc => {
                const div = document.createElement('div');
                div.className = "flex flex-col gap-2 p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-2";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-sm text-gray-700">${acc.name}</span>
                        <span class="text-[9px] text-gray-400">更新於: ${new Date(acc.lastUpdate).toLocaleDateString()}</span>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" inputmode="decimal" value="${acc.amount}" id="acc-${acc.name}" class="flex-1 bg-white ring-1 ring-gray-200 rounded-lg px-3 py-2 text-sm font-bold">
                        <button onclick="updateAccount('${acc.name}')" id="btn-acc-${acc.name}" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold transition hover:bg-blue-700 flex items-center justify-center gap-2">
                            更新
                        </button>
                    </div>
                `;
                list.appendChild(div);
                const accInput = document.getElementById(`acc-${acc.name}`);
                accInput.addEventListener('input', function() { this.value = toHalfWidth(this.value); });
            });
        }

        async function updateAccount(name) {
            const url = localStorage.getItem('gas_url');
            const btn = document.getElementById(`btn-acc-${name}`);
            let sanitizedAmount = parseFloat(toHalfWidth(document.getElementById(`acc-${name}`).value));
            
            // 💡更新為使用自訂警告視窗
            if (isNaN(sanitizedAmount)) return customAlert("請輸入正確金額");

            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div>';

            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "updateAccount", name: name, amount: sanitizedAmount }) 
                });
                const result = await res.json();
                if(result.status === "success") { 
                    showToast(`${name} 存取完成`);
                    await fetchData(); 
                } else {
                    showToast("存取失敗", "#ef4444");
                }
            } catch (err) { 
                showToast("連線異常", "#ef4444");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '更新';
            }
        }

        // 💡更新：全新升級的明細渲染系統 (按月分組 + 結餘轉入)
        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            if(records.length === 0) { 
                list.innerHTML = '<div class="py-20 text-center text-gray-300 text-sm"><p>目前還沒有任何紀錄喔！</p></div>'; 
                return; 
            }

            // 1. 將紀錄依照日期排序 (舊到新)，以利計算「滾動結餘」
            const sortedRecords = [...records].sort((a, b) => new Date(a['日期']) - new Date(b['日期']));
            
            const groups = {};
            let runningBalance = 0; // 全局滾動結餘

            // 2. 進行分組與計算結餘
            sortedRecords.forEach(r => {
                const d = new Date(r['日期']);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const monthKey = `${year}年${month}月`;

                if (!groups[monthKey]) {
                    groups[monthKey] = {
                        key: monthKey,
                        records: [],
                        income: 0,
                        expense: 0,
                        startBalance: runningBalance // 紀錄該月開始前的總結餘 (即上月結餘)
                    };
                }

                const amt = parseFloat(r['金額']) || 0;
                const isExp = r['類型'] === '支出';

                if (isExp) {
                    groups[monthKey].expense += amt;
                    runningBalance -= amt;
                } else {
                    groups[monthKey].income += amt;
                    runningBalance += amt;
                }

                // 將明細塞入陣列開頭，這樣渲染時同月內「最新」的紀錄會在最上面
                groups[monthKey].records.unshift(r); 
                groups[monthKey].endBalance = runningBalance;
            });

            // 3. 取得所有月份的 Key 並排序 (新到舊，讓最新的月份在最上面)
            const monthKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

            // 4. 開始渲染各月份區塊
            monthKeys.forEach((monthKey, index) => {
                const group = groups[monthKey];
                const monthBlock = document.createElement('div');
                monthBlock.className = 'mb-8 bg-gray-50/50 rounded-[2rem] p-2 border border-gray-100';
                
                // 💡更新：月份標題與摘要 (加入上月結餘，並優化手機版四欄排版)
                const headerHtml = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 px-3 pt-2 pb-3 border-b border-gray-200/60 gap-3">
                        <h3 class="font-extrabold text-gray-800 text-lg">${monthKey}</h3>
                        <div class="flex gap-2 sm:gap-4 text-right w-full sm:w-auto justify-between sm:justify-end">
                            <div class="flex-1 sm:flex-none">
                                <p class="text-[9px] sm:text-[10px] text-gray-400 font-bold">上月結餘</p>
                                <p class="font-bold text-slate-500 text-[11px] sm:text-xs">${group.startBalance >= 0 ? '' : '-'}$${Math.abs(group.startBalance).toLocaleString()}</p>
                            </div>
                            <div class="flex-1 sm:flex-none">
                                <p class="text-[9px] sm:text-[10px] text-gray-400 font-bold">本月收入</p>
                                <p class="font-bold text-emerald-500 text-[11px] sm:text-xs">+$${group.income.toLocaleString()}</p>
                            </div>
                            <div class="flex-1 sm:flex-none">
                                <p class="text-[9px] sm:text-[10px] text-gray-400 font-bold">本月支出</p>
                                <p class="font-bold text-rose-500 text-[11px] sm:text-xs">-$${group.expense.toLocaleString()}</p>
                            </div>
                            <div class="flex-1 sm:flex-none">
                                <p class="text-[9px] sm:text-[10px] text-gray-400 font-bold">期末結餘</p>
                                <p class="font-extrabold text-blue-600 text-xs sm:text-sm">NT$ ${group.endBalance.toLocaleString()}</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3" id="records-${monthKey.replace('年', '-').replace('月', '')}"></div>
                `;
                monthBlock.innerHTML = headerHtml;
                list.appendChild(monthBlock);

                const recordsContainer = monthBlock.querySelector(`[id^="records-"]`);

                // 渲染該月所有明細
                group.records.forEach(r => {
                    const isExp = r['類型'] === '支出';
                    const card = document.createElement('div');
                    card.className = 'bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center group';
                    const tags = (r['標籤'] || '').split(/[\s,]+/).filter(t => t).map(t => `<span class="tag-badge">#${t}</span>`).join(' ');
                    
                    const recordId = r['ID'] || r['id'] || r['Id'];
                    const dateString = new Date(r['日期']).toLocaleDateString('zh-TW');

                    card.innerHTML = `
                        <div class="flex items-center gap-3 text-left">
                            <div class="w-10 h-10 rounded-xl ${isExp ? 'bg-rose-50 text-rose-500' : 'bg-emerald-50 text-emerald-500'} flex items-center justify-center shadow-sm">
                                <i data-lucide="${isExp ? 'minus' : 'plus'}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="font-bold text-sm text-gray-800">${r['分類']}</p>
                                <p class="text-[10px] text-gray-400 mb-1 font-medium">${dateString} ${r['備註'] ? ' · ' + r['備註'] : ''}</p>
                                <div class="flex gap-1 flex-wrap">${tags}</div>
                            </div>
                        </div>
                        <div class="text-right flex items-center gap-3">
                            <p class="font-bold ${isExp ? 'text-rose-500' : 'text-emerald-600'}">NT$ ${parseFloat(r['金額']).toLocaleString()}</p>
                            <button onclick="deleteRecord('${recordId}')" class="bg-gray-100 text-gray-400 hover:text-rose-500 hover:bg-rose-50 transition p-2.5 rounded-xl cursor-pointer">
                                <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                            </button>
                        </div>
                    `;
                    recordsContainer.appendChild(card);
                });

                // 渲染「上月結餘轉入」 (放在該月清單的最下方，代表月初第一筆帳)
                // 條件：只要不是您記帳生涯的「第一個月」，或是期初金額不為 0，就會顯示銜接紀錄
                if (group.startBalance !== 0 || index < monthKeys.length - 1) {
                    const isPositive = group.startBalance >= 0;
                    const carryOverCard = document.createElement('div');
                    carryOverCard.className = 'bg-slate-50/80 p-3 rounded-2xl border border-slate-200/80 flex justify-between items-center mt-2 border-dashed';
                    carryOverCard.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-xl bg-slate-200 text-slate-500 flex items-center justify-center">
                                <i data-lucide="corner-down-right" class="w-4 h-4"></i>
                            </div>
                            <p class="font-bold text-sm text-gray-600">上月結餘轉入</p>
                        </div>
                        <p class="font-bold ${isPositive ? 'text-emerald-600' : 'text-rose-500'}">${isPositive ? '+' : '-'} NT$ ${Math.abs(group.startBalance).toLocaleString()}</p>
                    `;
                    recordsContainer.appendChild(carryOverCard);
                }
            });

            lucide.createIcons();
        }

        async function submitRecord() {
            const url = localStorage.getItem('gas_url');
            const sanitizedAmount = parseFloat(toHalfWidth(document.getElementById('inputAmount').value));
            
            // 💡更新為使用自訂警告視窗
            if(isNaN(sanitizedAmount) || sanitizedAmount <= 0) return customAlert("請輸入正確的數字金額");
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<div class="loading-spinner"></div> 儲存中...';
            try {
                const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: "addRecord", type: currentType, amount: sanitizedAmount, category: document.getElementById('inputCategory').value, date: document.getElementById('inputDate').value, note: document.getElementById('inputNote').value, tags: document.getElementById('inputTags').value }) });
                const result = await res.json();
                
                // 加入嚴謹的成功判斷
                if (result.status === "success") {
                    document.getElementById('inputAmount').value = '';
                    showToast("紀錄儲存成功");
                    await fetchData(); // 確保重新讀取完成後再切換畫面
                    switchTab('history');
                } else {
                    throw new Error("後端儲存失敗");
                }
            } catch (err) { 
                showToast("儲存失敗", "#ef4444");
            } finally { btn.disabled = false; btn.innerHTML = '儲存紀錄'; }
        }

        // 💡更新：將刪除功能完全改寫為使用自訂 Confirm 與 Alert 視窗
        function deleteRecord(id) {
            if(!id || id === 'undefined' || id === 'null' || id === '') {
                customAlert("⚠️ 刪除失敗：這筆紀錄沒有有效 ID。\n\n可能原因：您是在試算表上手動輸入，或試算表的 A1 標題不是「ID」。\n請直接前往 Google 試算表手動刪除該列！");
                return;
            }

            showConfirm('刪除紀錄', '確定要刪除這筆明細嗎？此操作將無法復原。', async () => {
                const url = localStorage.getItem('gas_url');
                
                try {
                    const res = await fetch(url, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: "deleteRecord", id: String(id) }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    const textData = await res.text();
                    
                    let result;
                    try {
                        result = JSON.parse(textData);
                    } catch (parseError) {
                        customAlert("❌ 刪除失敗！GAS 後端發生錯誤。\n\n【最常見原因】：更新程式碼後忘記選擇「新版本」部署。\n\n【後端實際回傳】：\n" + textData.substring(0, 150));
                        return;
                    }
                    
                    if (result.status === "success") {
                        showToast("紀錄已刪除", "#64748b");
                        await fetchData(); 
                    } else {
                        customAlert("❌ 刪除失敗，後端訊息：" + result.message);
                    }
                } catch (err) {
                    customAlert("❌ 網路連線錯誤：" + err.message);
                    console.error(err);
                }
            });
        }

        async function analyzeWithAI() {
            const apiKey = localStorage.getItem('gemini_api_key') || "";
            const btn = document.getElementById('aiBtn');
            const display = document.getElementById('aiResponse');
            btn.disabled = true; btn.innerHTML = '<div class="loading-spinner"></div> 分析中...';
            const context = `總資產:${document.getElementById('totalAssetsDisp').textContent}, 本月支出:${document.getElementById('mExpenseDisp').textContent}`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `分析本月財務：${context}` }] }] })
                });
                const data = await res.json();
                display.textContent = data.candidates?.[0]?.content?.parts?.[0]?.text || "分析失敗";
                showToast("AI 分析完成", "#6366f1");
            } catch (err) { 
                display.textContent = "AI 異常"; 
            } finally { btn.disabled = false; btn.innerHTML = '開始 AI 診斷'; }
        }
    </script>
